<!DOCTYPE html>

<html>

  <head>

  <style>

    #map-canvas { width:900px; height:1000px; }

    .layer-wizard-search-label { font-family: sans-serif };

  </style>

  <script type="text/javascript"

    src="http://maps.google.com/maps/api/js?sensor=false">

  </script>

  <script type="text/javascript">

    var map;

    var layer_0;

    var layer_1;

    var layer_2;

    function initialize() {

      map = new google.maps.Map(document.getElementById('map-canvas'), {

        center: new google.maps.LatLng(40.77524264632281, -74.47083346210934),

        zoom: 9,

        mapTypeId: google.maps.MapTypeId.ROADMAP

      });

      layer_0 = new google.maps.FusionTablesLayer({

        query: {

          select: "col12>>1",

          from: "1gx00BviGDrMBRslvm--dE04oNSyWZWrh5isIBCS0"

        },

        map: map,

        styleId: 2,

        templateId: 2

      });

      layer_1 = new google.maps.FusionTablesLayer({

        query: {

          select: "col2",

          from: "1fyNJTsbN7yG96KNstri1yxVenluVDmZb19IssOk"

        },

        map: map,

        styleId: 2,

        templateId: 2

      });

      layer_2 = new google.maps.FusionTablesLayer({

        query: {

          select: "col2",

          from: "1koN26YrOCmLpZStZL8YNtf3kpveToUsFLIN7Ol4U"

        },

        map: map,

        styleId: 2,

        templateId: 2

      });

    }

    google.maps.event.addDomListener(window, 'load', initialize);

  </script>

  </head>

  <body>

    <div id="map-canvas"></div>

  </body>

</html>
