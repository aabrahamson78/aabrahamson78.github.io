        float: right;
      }

      function initialize() {
        var Group = 'Poverty';

        map = new google.maps.Map(document.getElementById('map-canvas'), {
        center: new google.maps.LatLng(40.52276765213958, -74.76903048828126),
        zoom: 8,
        mapTypeId: google.maps.MapTypeId.ROADMAP,
          zoomControlOptions: {
            style: google.maps.ZoomControlStyle.SMALL
          },
        });

        var layer = new google.maps.FusionTablesLayer();
        updateLayerQuery(layer, Group);
        layer.setMap(map);

        createLegend(map, Group);
        styleLayerByGroup(layer, Group);
        styleMap(map);
        drawVisualization(geometry);

        google.maps.event.addListener(layer, 'click', function(e) {
          var Sub-County = e.row['Sub-County'].value;
          drawVisualization(geometry);

        google.maps.event.addDomListener(document.getElementById('Group'),
            'change', function() {
              Group = this.value;
              updateLayerQuery(layer, Group);
              styleLayerByGroup(layer, Group);
              updateLegend(Group);
            });

        google.maps.event.addDomListener(document.getElementById('Sub-County'),
            'change', function() {
              var Sub-County = this.value;
              updateLayerQuery(layer, Group, Sub-County);
              drawVisualization(geometry);
            });
      }

      function updateLayerQuery(layer, Group, Sub-County) {
        var where = "Group = '" + Group + "'";
        if (Sub-County) {
          where += " AND Sub-County = '" + Sub-County + "'";
        }
        layer.setOptions({
          query: {
            select: geometry,
            from: '1AeEmnoL96Cp17_aeU3Y4LPGXHdENUSnfzhstpRE',
            where: where
          }
        });
      }

      function createLegend(map, Group) {
        var legendWrapper = document.createElement('div');
        legendWrapper.id = 'legendWrapper';
        legendWrapper.index = 1;
        map.controls[google.maps.ControlPosition.LEFT_BOTTOM].push(
            legendWrapper);
        legendContent(legendWrapper, Group);
      }

          legendItem.appendChild(color);

          var newMin = minNum + step * i;
          var newMax = newMin + step;
          var minMax = document.createElement('span');
          minMax.innerHTML = newMin + ' - ' + newMax;

      }

      function updateLegend(Group) {
        var legendWrapper = document.getElementById('legendWrapper');
        var legend = document.getElementById('legend');
        legendWrapper.removeChild(legend);
        legendContent(legendWrapper, Group);
      }

      function styleLayerByGroup(layer, Group) {
        var layerStyle = LAYER_STYLES[Group];
        var colors = layerStyle.colors;
        var minNum = layerStyle.min;
        var maxNum = layerStyle.max;
        var step = (maxNum - minNum) / colors.length;

      function styleMap(map) {
        var style = [{
          featureType: 'all',
          stylers: [{
            saturation: -99
          }]
        }, {
          featureType: 'poi',
          stylers: [{
            visibility: 'off'
          }]
        }, {
          featureType: 'road',
          stylers: [{
            visibility: 'off'
          }]
        }];

        var styledMapType = new google.maps.StyledMapType(style, {
          map: map,
          name: 'Styled Map'
        });
        map.mapTypes.set('map-style', styledMapType);
        map.setMapTypeId('map-style');
      }

      function drawVisualization(geometry) {
        google.visualization.drawChart({
          containerId: "visualization",
          dataSourceUrl: "http://www.google.com/fusiontables/gvizdata?tq=",
          query: "SELECT Group,'2012' " +
              "FROM 1AeEmnoL96Cp17_aeU3Y4LPGXHdENUSnfzhstpRE WHERE Sub-County = '" + Sub-County + "'",
          chartType: "ColumnChart",
          options: {
            title: Sub-County,
            height: 400,
            width: 400
          }
        });
      }

      google.maps.event.addDomListener(window, 'load', initialize);
